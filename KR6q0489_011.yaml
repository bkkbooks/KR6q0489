body:
  text: 門人如暐等編雜偈住勝覺旗山隨處示衆共二十首當機貴在力逢緣一任雲興問上前千澗水流必到海萬山月落不離天兩頭擔出攔中斷格外呈來對面穿中得雪峰鱉鼻口悉從方外打鞦韆行一香完坐一香本來無礙也相防千生有漏情難盡萬劫無明影未忘非止間行消白晝豈甘空坐守清堂忽然迸破娘生面不負林間走一場天長地久總相然一色光含億萬年烈日如爐蒸豹髓飛泉似劍觸龍淵電光豁閃穿針妙雲貌才興轉臂玄無數能仁今古共一回拈出一回鮮白晝雷鳴聲震空知音聞聽耳雙聾勾神快向聲前薦引祟休於電後通仙侶浮槎逢漢月商人採寶遇時風入流亡所同歸處渴飲曹溪水一鍾從來大道絶疏親臂腕相攙掖後人水底金虯呼獬豸空中玉兔照星辰一來一往千年燦或缺或圜萬載新上下高低同隻眼風飄香桂遠傳因百川湛合理何窮光接澄淵上界通急浪灘頭休探影寧波岸畔且收篷龍藏東海登天勢鯤化北溟掩日雄香水重重來集會恢張法性任圜融無端向外憶生緣滿目家山轉棄捐延客馬師仍合醬祈賢讓祖故磨磚薪山雪禁無人採花圃風搖有蝶穿枯木龍吟無所礙遊人盡被葛藤纏相逢不滯有無機一蹶翻身到翠微獨我宮中光曣曣從他山外雨霏霏龍天捧足祥雲粹玉獸銜花瑞相希初吼一聲狐氣盡人傳獅子奮全威皚皚雪月未嘗昏休把安心斷臂論一色無餘欽慧命纖塵有動觸慈尊掀翻法座仍扶几寒透肝腸復轉熅一印不疑須了當太鵬出現取龍吞玲瓏無礙若虛庭雲散窗前月滿櫺帶露喬松常拂翠當風蘭卉遠飄馨三明普照六塵淨九竅全通萬慮停到此聖凡情共盡何分劣相與殊形標出奇峰撑碧寥野雲蕩盡色連霄曾經慧鑑雙輪照那懼寒風五夜飄德忝光輝舒秀氣恩沾雨露長靈苗分明不假神通力法爾如然本自高深深緑草起東皋長養烏駒得俊毛踏透玄關知地穩瞪開慧眼見天高扭回野鴨權為伴呼轉魔軍且代勞妙用今騰何處息一江風靜斂波濤單著一邊只謂無無錐卓地有通衢鳳凰山下收金粟翡翠溪邊摘玉蘆海寶千般還易負摩尼一顆最難孤隨心滿願皆如意應物場中不墮枯有漏身藏無價珠遂忘故此涉長途逢人指出其中寶信手擎來獻老夫爍爍走盤光不減堂堂映物焰何孤功歸續向如來藏耀遍叢林義不殊祥雲作蓋本非根豁爾因風又現存伴鶴飛來旋鶴樹從龍行去繞龍門有收有放非間走無束無拘豈亂奔運向林中枯稿處平常帶雨灑乾坤騰今耀古露真常祖剎何曾夜寂涼開眼明知燈是火歸家始覺殿為堂金針玉線條條彩鐵壁銀山座座光截鶴續鳧俱勘破高低相應廣流芳祖庭秋晚賴誰能一道圜光觸處興茶熟地爐無客待芹生水際有雲蒸隨緣放下何曾減信手拈來尚未增百尺鳥窠能作主布毛吹起續傳燈波瀾深處泛輕舟一曲漁歌泊渡頭芳草堤邊堪曬網疏蘆岸畔好垂鉤始知影到人非到方信橋流水不流復問其中端的旨滿船風伴一輪秋真誠烏弋産獅兒百獸群中孰敢欺嗥吼斡回天際月蹲踞坐斷嶺頭岐獨行獨步人難並為瑞為祥自不疑出窟若無聲震地萬峰深處有誰知尺璧寸陰殖價難披衣得坐靜時看然無法鼓當風奏現有瑤琴對月彈雲帳揭開天眼淨墨花飛遍硯池乾更沉漏永將休下燦燦銀河斗柄寒居山示衆四首戀著空花受往還徒勞披霧隱深山執情漂墮長江浪背境沉埋永夜關穿徑竹邊和鳥噪過霜橙裏效猿攀真然巨量吞舟者不作潛萍合水灣為人憤志莫辭艱直下迸開五蘊山露地玉毫輝萬象遼天金鏃破三關居榮豈被榮場礙處辱何妨辱境攀一片間雲留不住行通鳥道接流灣知歸休用管窺斑當下無心盡此山芳草馬嘶回地軸緑楊牛吼轉天關通津春浪隨消長拂樹秋風絶仰攀黃葉從來猶分外何妨飄蕩落泥灣頃盡微寒無兩般鷓鴣啼在月當山塵塵朗耀通天際剎剎圜明透海關灰志難逃落見障存緣未免受魔攀獨行窄路無寬見那覺滄溟納衆灣示病者觸著鋒鋩便捨頭無明大症一時休依方揀藥來療治烈焰坑中又潑油即時氣斷樂無疆莫教來年返禍殃野祟相牽容易解家親作耗卒難禳春耕示衆急箭韶光實可哀田園休待草深來古今養子不如父無限家門一世灰贈雲嶔禪人二暑一休遍界秋孤光越出萬山頭神仙不貴封官職穩坐蓬萊樂自由贈雲嶽禪人此寺荒涼久硜心欲播揚誰知今日意還是舊時光果滿回龍院花開勝覺場風雲相聚會終有一番香贈雲徹禪人倒卻竿頭誓不栽苦心常要一肩抬廝兒境界非能小樓至擎拳再後來懷雲岩禪人倚天照雪利無私殺活全彰在一時離相絶名人不會臨將短笛隔山吹贈雲岸禪人長年瀝膽為林泉引水開池應有緣一任魚龍生誹謗何曾枉使昧心錢贈雲岫禪人心無礙處若晴空朗朗端然在個中上下圜明左右看並無南北與西東贈古風掩關獨向峰頭頂上行須知卓處要超情一朝跳出牢關外始見曹源正脈清贈全一禪人知恩相報苦難休絶後鑊湯走一頭無影林中懸日月不萌枝上辨春秋贈雲崢禪人歸來不昧己當時作棟為梁在此基古寺頽零三六載今朝又仗汝撑持贈雲嶸禪人大富門風家最貧時來節至換衣巾一年一度山前看谷暖陽回自有春贈斷崖禪人迸破疑團當下休莫將山水再惟惆頂門自有通霄氣包褁乾坤在裏頭贈雲崇禪人靈苗穩當出頭來豈被風霜陳陳摧植在林中不妄動有時也作棟梁材示雲峰禪者殿後藏身虛歲月門前側足誤平生草頭珠露休貪戀坐斷峰雲頂上行贈養忠禪人一列青山一派溪迢迢曲徑使人迷今來收足單前坐無耳聞鐘箇箇齊贈雲瑞禪人冰情化盡雪心融眼面浮塵漸漸空好出松門旋一匝時常觸動有真風贈雲野禪人千山疊疊渺難窮直在當然一鑑通應化隨方雖有異無錐卓地又相同贈雲亭禪人不攀月桂不尋枝光景何曾欠一時落在掌中隨取用休將意馬走多岐送純修王大德新成舊歲歲成新目下難忘一段春谷口停猿驚坐客松枝待鳥喚行人贈雲崑禪人春到鉤簾歸乳燕秋來穴紙出蒼蠅林間休了這場事餘外清間不過僧贈雲祥大德雲耕月種不差時盡在把鋤見處宜博飯開田林下務家常能有幾人知示惟菴大德水從大海月從天湛則清兮淨則圜水湛月圜情坐斷出頭分外獨超然贈廓然大德珍囊不惜念常存擬向何方助法門𠁼點一全信受雷音未震已叨恩贈歸元禪人揚起孤燈少睡眠撥前看後是何緣影光脫落眼空廓一覺天明正不偏贈簡心王居士一折了然便到家交光雪月定無差寒情化盡東風轉結實還培五葉花贈雲覺禪人求智不若了無明了得無明快一生智慧無明俱了了魔宮虎穴任橫行贈雲貫禪人門外炎天似火燒誰人不愛雪花飄一朝頓入空王殿寒暑不干本寂寥贈法海禪人僧祇不歷便稱尊掘棘分明要斷根根斷力微鋤柄折十方一路涅槃門贈法藏禪人誓入當來駕此舟怎離兩岸與中流夜深不向蘆灣宿一色圜明正九秋贈超凡陳居士寂寞門庭冷似冰長年自憶百無能東君德布叢林下吹徹寒梅樹樹興贈陳門蕭居士喻若池中朵朵蓮淤泥不染自新鮮覺除淨穢無分別東土西方一坦然示端石禪人寂寂靈靈莫放憨有何禪道與君參吹毛劍下分身去仰望商量落二三示融通禪人天魔相近不知蹤坐斷當央第一峰到此了時無可了高人豈肯便疏慵贈寶峰大德凡聖同居個個圜目前轉變隔重煙毗嵐風卷無高下市井林泉月一天贈月朗大德人誇了當只除心無焰明珠易得沉更進龍門行一匝方知滄海幾何深贈越凡賀居士寒山枯木黃昏際古殿殘燈夜靜時撑出瞎驢正法眼流傳千載鑑愚癡贈賀門陳居士生死輪回是妄招心光未燦障難消秋江白霧齊收盡一刻圜明當下超示開照大德佛祖本無一物傳拂牛劍氣為愚賢堯天境界無征戰不令而行樂化年示如心禪者清光滿眼照無邊只為瞳兒被物遷非是物兮非是眼當陽一棒脫縈纏贈開凡饒居士靈根夙種果非差把斷長江直到家煙盡晚來窗外看一輪明月映天涯贈漢卿馬居士無限迷頭入苦哉溪山磨盡幾英才知歸達士常如是步步蓮花火裏開贈盛我鑄鐘純鋼煉就甚堪誇須是當爐遇作家一火鑄成真法器洪音千古震中華示雪嵋禪人夜水金波少去翻必須先要頂𩕳端返身踢倒楊花岸方效漁人把釣竿寄雲山謝居士藥囊空盡就抽頭幾個男兒得便休不涉波瀾歸故里任他門外逞風流贈明鑑周居士非是物兮非是心從空放下絶追尋彌雲喝退沒來往露出青天蓋古今贈明輝羅居士長河浪靜涵新月枯木花開露早春拈卻聖凡無二路通天徹地一時均贈君召賀居士進步如登萬里山須當著力莫回還緉鞋踏破峰頭止越出人間非等間贈賀門金居士努力參禪休畏崎當軒直露不移時人間到此推無分處處風清月滿池贈瑞雪禪人直切分明指示君中無點不須分此間莫待脣皮動啐啄同時便出群示月來大德要絶根塵第一株休隨浪蕊涉程途先須勘破浮生事始信間名播五湖示繼武梁居士故園結果滿其枝惱亂猿情未了時酷暑今從秋晚斷一鉤新月上峨嵋贈達心大德大事難明路徑多不能折合便成魔果然達得無心處百億修羅盡罷戈贈覺凡胡居士水上浮漚夢裏花終朝使我日偏斜萬緣一目輕窺破攃手歸來是故家示應天大德未曾跳出刺中欄不歷栴檀到底難假使一爐燒化盡年終依舊孟春寒贈元見大德雨過雲開曉半明天邊一發盡圜成清光耀出乾坤外非是依山傍水行示忠和禪者巖頭佛法從胸涌摩詰香饈在上方會得古人出辦處一時周備萬年糧示悟一大德見道從教眼似眉迥然越出路中岐客常來往無留礙本住長安不用思示明一大德一光東照應皆全萬法同彰在此圜次第觀來窮不盡何勞別外轉求玄贈秉然賀居士為人在世莫同癡火宅交煎仔細思思到無思安穩處雲開山舊不曾移贈恆融大德欲離有漏出凡籠念念猶如救火同異日煙消灰冷盡分明別是一家風贈恆通大德處處桃花三月放家家雞向五更啼能藏不住非聲色覺了所知盡不迷壽彭居士九品蓮臺萬朵香七重行樹千枝秀速將情見盡揩磨同證金剛無量壽贈應祿彭居士水中顧影枉勞神雖現其中未是真淡淡秋雲無點蔽舊時風月卻從新示寂定大德合水和泥須換步平田淺草要翻身頂𩕳若具通方眼一陌花開萬里春贈雪谷大德諸行無常總是空浮生夢穩被他籠幻緣不著出情量蕩蕩無雲天地通示息塵大德昔年一別至今來心地方知尚未開莫謂無人重指示夜猿啼在月當臺贈無玷楊居士樹逢秋老難留艷水向東流無復波莫把光陰容易過靈臺一點要揩磨贈本淨楊居士青山屹屹水茫茫會得猶如在故鄉舉目相親親切處休生惆悵望斜陽示無著大德毛端放過有千差得本何愁聚海沙若要不經閻老案滅除陽焰與空花示含藏大德行盡千山在那方牛欄馬廄普光堂不翻貝葉文相現一度門開義兩行示不二大德這段因緣會也麼滔天浪是湛澄波有時把斷源頭路苦海全超一剎那示得元大德燦燦明珠晝夜光親逢實得卻相當若然見理不圜處縱尾金鱗易落湯示悟見大德誰是如來正法輪江山色秀洞中春炳然離此尋方便海外求珠非是珍示悟旨大德杜絶言詞不在音作家有甚芥投針就中一點齊拈卻正晝晴陽一色金贈無塵大德父母未生一著前智如鶖子亦難宣世人不識入頭處喚作將心直指傳贈明覺向居士這點靈光不可輕沉埋未悟沒深坑回頭勘破娘生面鋒鏑林中任縱橫示從修楊菴主眼前有事要人知垢盡明來處處宜識得蒼蒼眉兩道不同情境外邊馳示重修楊居士風飄雲練出危壑雨灑山溪漫古臺莫道不逢天意轉春光動地一時來示思修易居士頓破胸中一點疑猶如空界越須彌白雲若向黑山走不被彎藤怪石欺贈靈冶禪人草裏不馳器易成久經大冶見靈明清音鑄出何方扣野店黃昏喚有情示華峰禪者晚上無燈月現瑞風前有路桂生香回光頓入圜通裏不枉旗峰住一場贈了為大德遠觀近聽有奇緣寶劍一揮定正偏到此水窮山也盡中天直露一輪圜贈脫凡王居士凡情迥脫事非常應念沉淪在苦鄉了已若還不濟物誰來海內作慈航示本然大德念佛參禪須到家不然還是守空花眼前把捉消時歲失主臨危甚可嗟示惺知向居士眼觀莫及耳何聞山月一彎正不分人謂此間消息斷秋風動處水成紋示了見禪者出家正路別無求只要堅心看白牛春草萌芽若不顧枉來林下剃光頭示惺然鄧菴主為僧非是樂便宜生死循環要出離杳杳冥冥消日過眼光落地苦難辭示惺見張居士朝朝溪澗順江流泛起漂舟要轉頭滿載月明若薦得不虛此岸度春秋示明達楊大德滅卻心猿絶細詳不明明處好承當山前鳥語聲聲噪道破元初一段光示明覺大德暑往寒來苦不休退身一步孰能酬斯時不辨賓中主滯到當來佛也愁示明輝楊居士昨夜東風吹滿林松濤落澗是何音不疑一念光通達五百年前在此今示明燦居士河沙妙用一微塵理有來源事有因莫道無波龍變化朝陽乾地盡沉人示明俊楊居士隔溪樹動有西風一物明時萬物同何必香煙從獸口端端只望出爐中示楊門聶居士曹溪一派理無多攪則差兮泛則訛活水山前若未契緑楊橋下望長波示明本大德寒蟬勸織鳥催耕豈待鐘敲月下聲聞所覺空空覺滿回頭返顧一般平示明德范居士少室玄微不較多岐分絲染太淆訛當陽劃斷分賓主莫教將身湊網羅示惟闊大德一處了然六不存全無障礙普稱尊隨將寶劍一時按盡教天魔喪膽魂示惟現大德證道人人事可能只緣撥火要挑燈昏昏一盡天明曉照化千山萬水冰示佩玄楊居士參禪似種朝陽地照著耕牛在面前頓斷繩頭無管帶緑楊兩岸任從眠示秀川楊居士受戒殺生勿兩岐是誰犯了是誰持返觀本自無來處當下雲開月正時示國甫楊居士不惜途勞勝覺來當陽一喝破塵埃了知幻化非干己一道清風送月回答德公劉居士次韻棟梁近日少人為君向南方擇異木用在一毛端上頭轉新架個獅兒窟端居吼退野干群續焰傳燈上正録不獨旗山觀皓月紫雲他日呼幽谷芬芬水草納金牛郁郁藤蘿調玉鹿弄巧以成拙未拙削尖而作禿非禿一鎚擊碎琉璃瓶共與維摩把口杜幻境有凋亦有成性天無罪亦無福清波弄影不堪傳石火翻身方可續接物並無水和泥利生豈用皮黏骨閻街市上有忙忙常寂光中何碌碌越出世間天莫測別傳教外人難卜往來三界任為賓果是瞿曇真種族初祖贊一葦浪裏度娑婆若遇知歸不較多影落寒潭人不會將來紙上起風波再贊來不喜去不憂一輪月萬載秋無心映入長江裏魚龍認影幾時休咄呂巖真人贊劉居士請題始會鍾離醉漢受渠仙術之功後將一粟問黃龍開眼依然似夢叱云守尸鬼子未免到頭落空怒將飛劍觸高宗怎奈一毫不動再拜復求指示覺知漏盡非終靈明一點近相通不把琴囊撥弄君來欲我書贊山事猶忙不恭春時放過等秋風吹出西江月頌自贊月菴請題處世一生全勿含養截佛正偏斷人伎倆理極情窮攔腮便掌這般惡僧誰肯瞻仰勝覺監院請破山續派靈隱傳芳握臨濟之寶劍剖衲僧之錦囊貧者即與肩擔臂荷富者便教家破人亡非是平地波浪從來萬古綱常嘯峰禪人請看這一慵僧半喜半不喜已生有此憑未生無可比用意即不中誰人畫得你畫得你具眼兒孫明的旨雲覺大德請旁觀略可憑正覷沒交涉幻像隨人看真心難辨別難辨別雲過山頭覺有月旗山監院請不覺來楚地迄今數十年心直遭人怨口快被人嫌問道不許喚作道參禪不許喚作禪灼然撥去眼中屑更要如何便動拳想起這般惡辣漢兒孫不把當為然頂目禪人請百戰功成一時卸下佛來亦打魔來亦罵尚非粗心何曾膽大有據可憑無人著價然爾較些不妨張挂融通維那請衲僧林下禍害佛祖位中冤家有時訶風罵雨有時攃土拋沙打穿無限漆桶不知那箇堪誇返身都歸正位勝過五葉一華法派真如廓際悟心宗繼祖聯芳道裔隆正照靈明開慧鑑一光普映達圓通聯芳偈樵山如奐脈發川黔到楚天單提祖印授高賢時來休挂寒巖上據令當行續正傳雲嶸如晥紹隆佛祖意若何橫按莫邪不較多覿面一揮傳正眼人間天上本無他月菴如朎地轉天回一陳風長空皓月出雲籠前賢不昧今相照光透圓明映楚中德嶠如奕越出描蹤捕影門英雄堪是濟兒孫眉間帶印出頭去萬古提持共報恩雪澗如暟先聖己靈概莫孤曹溪嫡派滿江湖只須踏破沉潭月遞接高人上祖圖嘯峰如暐翼展摩天氣象殊新羅岸畔那能拘有時金翅入滄海奪盡獰龍頂上珠

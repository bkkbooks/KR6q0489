body:
  text: 門人如暐等編頌古法華眉間現瑞遍界為身不覆藏本無留礙露堂堂三千行布憑斯鑑百億法門在此彰濁水波中浮桂影清風座上擁爐香白毫半分含沙界莫教扶牆走路旁安詳而起唯此無餘直頓超思量滯見隔天遙開舟猶為風江淺拂霧只因月漢高少向劫前達本旨多隨句後擇靈苗聚沙童子皆成道響水關山落斷橋譬喻品苦火循環曉夜然揚聲高叫為誰顛排珍置寶俱皆計駕鹿乘羊總是權稚子心開欲海盡白牛蹄破慢山穿更於何處出三界把斷前峰一帶煙窮子喻餘年漂蕩枉奔波今契家懷意不蹉富到猶嫌千口少貧來獨恨一身多博財置業將垂地枯骨還魂便肯佗老朽年高無力伎得兒軒下理機梭藥艸喻蠲除熱惱洗霾塵萬類同沾愈色新在地根莖分小大從雲雨露勿疏親高山艸木頻頻秀淺水池塘漸漸均埜外林中枯槁者雷音轉震又回春化城喻至寶難通設化城誰知中道入常阬月巢鶴執千秋夢雪徑人忘一色程拆錦還須織錦剖抽橋依舊架橋平自扶自倒何堪任可見當時沒俊英繫珠喻曠劫圜成衣下珠云何辛苦涉程途离婁浪隔因存意象罔光通貴絕謨欲向金臺越寶器但將銀縷貫璣圖層層縫露休勞指曷到遠方把自孤鑿井喻滿軸霖漓正不偏秋風卷處落誰邊滄溟普納無殊理細澗分流有別緣船壓海中休問水日銜嶺上免窺天等閒識得源頭處何必深穿費力堅髻珠喻塵塵盡是聖輪宮豈在當人用力充戰敗魔軍憑那用掀翻窩臼顯誰功王珍加賞防柔病梵語重安畏境風本自不從佗處得天然貴賤一般同父少喻大夢覺來管自明不分老少論枯榮撥開天竅識真境裂破香囊見假名皓月無心圜淨器清風有意掃疑情纖毫不立殘年盡柳岸鶯啼共日生良藥喻解脫珍衣披垢來三祇返復為塵埃良方用盡堆山艸生界依然滿地災此土久留生厭退佗鄉遠囑送音回誰知著藥翻成病累及兒孫墮惡胎三句頌第一句鐵眼銅睛不敢覷忙忙欲近前直取喪身去第二句夜半星辰皆拱聚寥寥徹正時有眼莫能遇第三句兩分明一具堂堂動用中到處咸周備總頌同天共地一輪孤運照山川落二途喝退浮雲空劫外原無半句立規模三玄第一玄千聖從來不肯傳樹撼皆風動煙飛是火然第二玄出海銀蟾耀碧天清光成一片未見白雲連第三玄千峰相對一谿前多年桃李樹春到一回鮮總頌觸目三玄理事彰前明後暗莫思量普觀落塹陰彌處麗日騰消大夜霜三要第一要兩鏡交輝明白道擬言更若何不覺熏身尿第二要魚到龍門絕計較掣電兩分身雲開星月耀第三要荒田瘦地一光照未曾下手敲溼豆當陽爆總頌三要同開選佛場了無一要絕承當不能就體裁衣式萬象森羅日播揚奪人不奪境毛端把斷絕知音萬里無煙碧洞深月白風清當五夜山河純是一團金奪境不奪人捉霧飛龍出海淵翻身磕破釣魚船生涯了當人無路直得歸來坐岸邊人境兩俱奪疾雷急電兩相逢倒嶽傾湫世界空莫道張良多巧計河沙諸佛也難窮人境俱不奪雲起南山雨北村牧童鼓舞過柴門一聲嘹喨東風裏不遇時人枉自奔總頌先賢愍物太叮嚀水內影須岸上形聖解凡情皆幻事癡人著眼似流星金剛寶劍龍蛇陣上直相衝落艸沉潭總不容及盡氛埃清四海了然獨坐大雄峰踞地獅子金毛氣象迥非同踞地全威八面風百獸遠聞皆伏竄那堪狐兔隱其中探竿影艸辨偽不妨探一竿調胭弄粉實難瞞旁邊有個掠虛者快教盲涎徹底乾不作喝用一喝雙分殺活齊無邊境界絕高低可憐翠竹黃花類飄向當鋒染血泥總頌大用全施聖凡難並異類逃亡乾坤肅靜四賓主頌賓中賓歷劫沉埋在苦淪相逢便問衣中寶帶水連泥辯不真賓中主月下端然等十五桂轂飄香撲面來便如狂蝶亂飛舞主中賓春萌秋落未同倫騰今耀古多龍聚少有盲龜到此親主中主高提祖印光輝普大器分金不吝鎚一花五葉綿千古總頌分賓分主驗龍驗蛇當陽一喝萬無兩家先照後用閃爍光中欲辨魔那容展演更如何直明未語出身意匹馬單刀不用多先用後照活捉生擒把用施將軍令到豈容遲不逢生死同條輩此處徒勞定業基照用同時塞海填河少聚堆棒如雨點喝如雷人亡家破無依倚曠埜精靈當下灰照用不同有時照用不同時分付燈籠少自癡要會箇中端的旨日間曲唱五更詞總頌照用雙行摘虎金鈴敲枷打鎖痛處插鍼五位君臣頌君位天然正位坐皇都別有功高用力扶慧眼精明何莫測從來玉院勿瑕模臣位萬古同天共國齊明彰聖代覺群黎百花叢裏纔開盡又到子規月下啼君視臣織就玄文錦對天龍顏獨露在其前青雲路廓堯風轉朕兆分輝化日綿臣向君天開文運出來香金牓題名百世芳荷國忠心恒不倦威揚海外佐朝綱君臣道合金鐘扣罷月明樓槩院瓊宮夜色悠偏去正忘功用盡無情卉木總低頭總頌空劫寥寥有甚傳璣珠簾外轉身玄龍樓到影方圜備玉鏡交輝理事全夜靜霜飄黃葉老天明日照碧潭穿不能勘破清波影一塢雲遮十里前續集頌古世尊初生步步泥蹤點赤金當時未契老婆心從新泛起無邊浪就水淘沙漸漸深忿性截流兮氣沖霄漢隨機設化兮平露胸襟初出眼睛空四海依然末後有知音東印請祖國筵座上愍癡頑緯武經文列滿班更向威音前一棒昂然擊碎兩重關達磨廓然廓然無聖盡虛玄教外一花果別傳下載清風徹不透到頭霜月過江前獨坐超諸有銀山一貫穿伎倆搬空得半個原來不在止啼錢鏡清出身風搖嫩柳窗中畫雨滴蒼苔石上琴圜頓法門難得會皮膚脫盡見人心見也未削追尋雨湊長江水更深慈明銀蟾薄花隨水莫能看這個家風下手難最好晚秋霜五夜一聲新鴈灼天寒趙州問二菴主自稚破家與佛齊為誰經繞翠林西佗方有月烏雲蔽此界無春白鳥凄雙放雙收分照用半開半掩共拈提臨機一箭穿心過兩個猢猻血染泥溈山水牯牛不懷就市有生緣涵秋河目近通天航旛掉轉清風起兩兩船歸一岸邊少室分骨分髓水月鏡花如意珍隨來映現一般均得魚掉臂忘筌去兩岸蘆花莫認真馬大師黑白離波別浪覓源頭不覺漂漂水上浮咫尺關山隔萬里被佗輥出混天毬白頭會得大畿已定黑頭了當干戈便休復持首尾來相告爛鐵無鋼真個愁世尊指地清秋一色照寒松莫把糟糠晝夜春鑑處生緣皆有分何愁變化不成龍馬大師不安日面月面朝輝暮鑑八節更而歷歷當空四時遷而灼灼未變得山水之同秋合君臣之運遍含紫光也斂霧收霞發玄樞也拏雲捉電六祖不會佛法徹底追來沒半灰隨機赴感動春雷道人不會單傳旨世計難分墨裏煤趙州狗子有無才高智大會鋪張似鶻提鳩孰敢當有翅不能飛出去任佗舌上擺旗槍英雄客在那廂莫待西峰影漸長或有或無聲未絕還佗一掌又何妨盤山心月昭昭顯露照無窮鱗甲羽毛徹正通莫道端居明白裏端居明白被雲籠金牛飯桶笑裏悲風二十秋落花流水莫能酬當時有個知歸者連席掀翻一旦休藥山陞座昨夜三更過急灘流沙滾滾最為難莫云老漢生慳吝揚起眉毛各自看眾集下座兮不辭道破一語不施兮望梅止乾饒將枝葉齊搬盡塞斷煙腸不到寒文公訪大巔動容非外靜涵則彌撥亂之節太平之時發機不把千鈞用這個春秋無了期咄莫待遲真誠不是小兒嬉臨濟大悟晴空霹靂正無私為破鴻濛恨命施極則難容無說處危亡不顧望前吹星風輕一颯摧破頂𩕳皮無依徹底行寬步平捋虎鬚便不疑鹽官犀牛藏鋒就事辨端由驚出頭來少欠收落得閒蹤卓在地賊人看見好成頭乾峰舉一寢堂門外艸茸茸剖得分明付與儂非是韶陽來辨出髑髏倒地不知蹤香嚴擊竹捷辯難詶無下落白巖灰志便如癡冰盤秋露無心戀玉樹春霜豈意思劫石消完否極盡芥城空罷泰生時臨機自有合投語幾辨方知是出奇嚴陽一物一鶚飛來過九天昂然已落正中偏斯時不遇開弓手貼肉皮毛怎得穿阿難遣二比丘那個出頭這個招兩成一過不相饒莫能覷破鞦韆影單愛東風把樹搖雲門拄杖化龍拄杖吞乾坤格外全提覓正貞鼓動風雷看變化錦鱗得當不虛名頭也正尾也精非同擾擾競頭爭殺人放火還皆恕理極情窮讓不成世尊陞座霖雨將垂遇大風和雲送去杳無蹤良天至意紅輪轉乾斷長江渴壞龍寶壽開堂縱處超奇奪者強頂門有眼辨秋光俄然非是真獅子遺累人間作棒瘡玄沙三病翳空片盡出情塵天上人間絕四鄰宴坐空生無說說散花梵眾不聞聞灰光巖畔覺猶錯活眼寰中見未真三種人歸一處了千門綠柳萬家春慈明提不起提不起不動尊雲居羅漢怎披襟崑崙頂上無棲處竹徑松門有梵音鐵磨到溈山披毛同類有家傳體段風流格外玄雪盡雲蹄疾似箭臨機全不費心堅無位真人明明空界鳥難栖是地荒來作鷓啼天曉不知何處去時人望樹走前谿一放過萬劫迷直下連根一手提臨濟拓缽以憑一口劍天下任橫遊乞兒圖小利猶落下風頭獨惟末後較些子欲得不能正好休女子出定雲挂青山玉片浮蟬鳴深樹不知秋今朝已散天空廓萬籟全彰盡喪謀寂然不動兮明明相映感而遂通兮歷歷方周若於此處輕留意孤鶩落霞一箭收臺山婆子已定寰中又出邊何緣不契老婆禪觸傷多少賢良客勘破分明不偶然趙州打毬鏡本無痕不用謨當臺遇境見根由毛毬碌碌是誰打念念滔滔那個流咄麻谷持錫殘歲盡便逢春端然不是兩家人黑白分明何向背偏圜合就好時辰那八兩這半斤打成一片也驚群灰飛燄滅然非動雪上加霜太殺懃次頌谷暖春回一是一非咄平地骨堆靈雲得悟一覺翻身見曉明便張旗鼓振家聲遠風送出林間去惑亂時人耳不清玄沙不肯雪心為人一片忠何妨特地鼓春風寒山不借陽和力怎得桃花滿地紅德山大悟跨鶴單言靈鶴俊乘船獨道木船強一風送到東洋海把著篙竿沒處量佛來難較魔來難張巍巍坐向孤峰頂罵雨訶風壓諸方趙州四門大方不擇荒田地馬到功成用得親若向空花研色相當門蹉過趙州人雲門餬餅蒼蠅覓縫枉紛紛如印印空豈有痕滯句乘言猶昧己投機展事見雲門黃檗噇糟眼清似海量同空威凜堂堂出大雄變化魚龍燒電火掃除狐兔露金風拂開毘盧頂不存報化功此處分明難湊泊連雲際斷月如弓高峰枕墮日間浩浩春暖鶯叫無夢無想椎到鐘響枕子墮地啞巴便掌休將鈍置五年看千里之駒無鹵莽次頌頓破沉齁不可孤夢中顛倒夢中扶夢來枕上和衣覺帶雨芭蕉入畫圖鏡清啐啄萬世權衡定不公迷雲蕩盡有奇風石頭火濺分緇素閃電光飛列異同母棄能懷日正晝子離滯㲉月當空諸天捧獻無窺處出沒同輪映海中南泉住菴水不成茶要人煎隨佗起倒就佗眠傾間不止還來犯拔出吹毛列半肩外道問佛劍匣光生難近旁爍迦羅眼不能張堂堂坐斷舌頭路外道天魔息戰場同寶所合一方將謂追風自有良僊天埜狐埜狐兒逆風鷂子老禿奴順水葫蘆見個甚麼意二俱莫含胡忘前失後兮南敲北動謂失不補兮滴乳成酥強不甘心我便犯僊天笑過一輪孤四隅不昧空王殿珠走盤兮盤走珠九峰不肯首座一輪煦日映榑桑非比人迷雪屋場變化飛龍猶夾帶錐錐點著見行囊守家當失威光時緣未遇返魂香當時不是九峰老師丈爐中徹底涼七斤布衫水冷天秋一色圜分珠帝網自綿綿知音莫去酬斤兩正用將來遮半邊世尊拈花分付原來在劫前那堪拈笑便流傳換花無限盲聾眼不信壺中別有天百丈埜狐一重煙水一重關五百生來非等閒不落脫皮燒化去當來不昧帶毛還撞入裏不是頑休言非跡在其間試看東風隨律轉依然舞翠不離山傅大士講經不會灼然穩當當拈沙攪污一鍋湯若非海納真天子兩個一齊擯出方長沙進步撲破琉璃碗艸堂夜不關始從綠水去又逐白雲還怪鳥吟喬木狂猿嘯岌山春回無限意靡不到其間臨濟擒定上座大展全機接待人孰容胸次作情塵九牛一挽隨收放列土分茅見主賓法眼行腳東土西天沒兩途玅門撼脫有何孤再將知解投明鏡事到臨臺列象殊南泉斬貓煙塵擾擾動高尊一舉齊來斷命根滿院驚惶失大利通身暢快報深恩艸鞋頭上堪求路狼藉堆邊休染痕真是死中得活者銜刀直顧進吾門佛日喂貓頻頻喂養莫拘功精壯威獰轉漸雄老鼠出頭纔定動全身喪在爪牙中迦葉擯文殊當陽舉起聚來忙無劍分身豈散場鈍置當時猶百億至今誰肯一棺裝陸亙養鵝損不壞長何存翀開異路別乾坤出缾不出擎來問一掌和聲休謂疼須勦絕莫囫圇共入維摩不二門世尊涅槃報化非真總是權執持四大落攀緣兩頭不著中開眼百億金容一相圜異學問佛拈除戲論亦非誠常與無常二間阬鸚鵡雖學人語句不知人事作麼行船子接夾山清廉之節將相之英不圖牽伴獨釣鼇鯨垂絲千尺還易展離鉤三寸實難爭老華亭老華亭電光出手使人驚輸卻前身也船篙傾盡贏得後山也花果結成石鞏架箭原是深山畋獵漢偶除鬚髮見超情飛潛到此難逃避只有當鋒少斷魂人孤峻道愈尊不是垛生不上門萬法歸一一歸何處賴有摩尼無價珠生涯轉盻盡何殊家山綠水光天德埜艸黃花壯帝都僧掀夾山禪床賊兒攻打富家珍命未逢時依舊貧佛祖位中留不住翻回地軸轉天輪雲門一寶片雲風卷盡萬里絕遮闌把定乾坤肅放開體用寬南星對北斗洞達是誰觀不待金烏催玉兔門開直下嘯澄團甘贄接待連鐺拓出又何妨縱奪臨時任主張兩個古錐齊捉敗勝如百味巧盛莊臨濟囑三聖皎然一喝播宗風血脈無涯盡界充破膽瞎驢成隊去天關撞碎地皮通雲門扇子𨁝跳上三十三天築著帝釋鼻孔東海鯉魚打一棒雨似盆傾鯉魚帝釋常相會休執多年骨董禪靜夜銀蟾初出海人間天上兩昭然觀世音菩薩將錢來買餬餅放下手卻是饅頭綠水青山更古悠有錢莫用冷饅頭霸王未到烏江畔一到甘心便肯休僧問雲門如何是一代時教門云對一說頌識得韶陽對一說答從問處合時節脫籠靈翮便翀霄望樹獼猴盡失穴僧問雲門不是目前機亦非目前事時如何門云倒一說頌識得韶陽倒一說日輪耀化萬山雪不須爐燄起光輝盡界冰河一路徹宋時兜率悅和尚住龍安室中垂此三問一曰撥艸參玄只圖見性即今上人性在甚麼處見頌雲水茫茫四海賓將心用意總非真一朝參到無參處幾點梅花天下春二曰識得自性方脫生死眼光落地時作麼生脫迷去雲開六不收涅槃生死兩無憂寒光徹地金風起一葉落時天下秋三曰脫得生死便知去處四大分離時向甚處去梯山航海路高低退步長安一理齊大寂定中原不住黎明天曉鳳凰啼總頌了了了時無可了休休休處未能休當時欠下嵩山債不作驢兮便作牛

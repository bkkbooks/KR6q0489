body:
  text: 門人如暐等編機緣僧問據虎頭收虎尾第一句下明宗旨如何是據虎頭師云八面全威進云如何是收虎尾師云一毛不讓進云只如空劫那畔將甚麼施設師云你到得空劫那畔也未進云分明提不起擬議即乖真師云也是鄭州出曹門僧問仰山以夢為覺南泉以覺為夢且道古人具甚麼眼目師云二俱是個瞎漢進云和尚分上又作麼生師打云是夢是覺僧擬議師連棒打出僧問踏翻須彌頂坐斷碧落雲時如何師云入地獄有分進云為甚如此師云拂開金世界劈破鬼門關僧問如何是威音王已前自己師云橫身當宇宙進云威音王已後師云一句定乾坤進云且道是那一句師便打僧禮拜師又打僧問相見不恁麼恁麼不相見師云當中不肯斷誰赴兩頭機進云在甚麼處斷師豎拂子云試道看僧擬議師便喝僧問靈鷲拈花果結何處師云不萌枝上進云未審滋味如何師云還我核來僧無語僧問雲接水送有辱宗風口乾舌結方負自己正在二途時如何師云一椎便透進云當下了然能有幾師云薄處先穿士問今日有話相問得否師云我不會答士云未審誰人答得師云三生六十劫僧問大通智勝佛十劫坐道場佛法不現前不得成佛道是何意旨師云祖師門下卻較些子進云大有人喚作布袋老鴉師云笑破乞兒口僧問如何是佛師云內無心外無目進云如何是法師云痛處針眼底沙進云如何是僧師云五湖四海月千嶺萬山雲僧問透網金鱗以何為食師云身在海中莫尋水僧禮拜師豎拂子云透得這箇麼僧無語師云將謂赤梢鯉又是癩頭黿僧問如何是金剛王寶劍師云斬斷靈龜尾進云如何是踞地獅子師云驚退野狐群進云如何是探竿影草師云開口則勘破進云如何是一喝不作喝用師云你又作個甚麼僧便喝師則打僧問昔日僧參仰山便問和尚識字否山云隨分且道是何分曉師云此處不言權在手進云僧右旋一匝云是甚麼字山於地上書個十字酬他此意若何師云天回地轉進云僧左旋一匝云是甚麼字仰山就改十字為卍字師云武就文成進云僧畫一圜相以兩手拓如修羅掌日月勢云是甚麼字未審有甚奇特師云魚龍得變化蝦蟹枉遭殃進云仰山又畫圜相圍卻卍字是何道理師云闍黎咬定牙關跳不出去進云為甚麼僧便作樓至擎拳師云聲聞辟支所不能及進云仰山道如是如是汝善護持便就肯他師云始終事盡共在其中僧禮拜師云無限仰山都被這漢鈍置不少僧展手師歸方丈僧問如何是第一玄師云不許浪捏拳進云如何是第二玄師云雲散月當天進云如何是第三玄師云到處總方圜僧禮拜起師云這是那一玄僧罔措師云假雞聲韻難瞞我未肯糢糊放過關僧問如何是涅槃心師云青山一片雲進云如何是差別智師云上苑幾團雪進云雲散雪消時如何師云今日不曾天晴僧無語師呵呵大笑僧問近日佛法如何師云兩山合掌一溪行道進云且道為甚麼如此師云覓個不會佛法底人進云適來一衆從山後下來和尚還見麼師云觀音妙智力能救世間苦僧問離四句絶百非時如何師云虧你開臭口進云口有甚麼過師與一掌云離四句絶百非僧問如何是第一要師云杜絶口頭妙進云如何是第二要師云萬象分明道進云如何是第三要師云天空任鳥飛水闊從魚躍師一日宴坐有僧來參師拈拄杖僧便喝師下來令僧就座僧不肯師即打出時有僧云適來這上座過在甚麼處師云鼠偷雞蛋莫認獅子輥毬僧問德山見僧入門便棒臨濟見僧入門便喝不知是何消息師云烏龜臂上無毛僧問離言說絶議論時如何師云放下著僧佇思師云酬衣去僧求開示師云且去明日來忽聞板響旁僧云喫飯去師與一掌云是何所在指東說西僧便喝師又打復示偈云一聲相應炳無私歷歷分明說向誰漆桶豁然箍爆斷方知過用苦鉗鎚僧問古人道有時奪人不奪境那個是人師云截斷來時意進云如何是奪境不奪人師云摧倒案前山進云如何是人境兩俱奪師云摧倒案前山有甚來時意進云如何是人境俱不奪師云追風天馬戴麒麟復拈拄杖云這是境那個是人僧擬議師便喝僧出師問何處去僧云隨衆作務去師云一堂人汝隨那一衆僧罔措師便打僧問住世脫塵埃何處最潔師云爛泥腳底進云行道涉嶇崎何處最平師云尖峰頂上僧禮拜師攙住云這是甚麼處僧無語師云只說是個人僧歸夜坐次云某甲有一偈不敢舉出師云放汝命通汝氣僧云對境無心蕩蕩清師云已濁了也僧云透出關闌沒化城師拈茶杯云透得這個麼僧擬議師便喝僧禮拜師云且證一半著士問如何是超宗異目師云三頭六臂士云如何是齊眉共躅師云不高不低士云如何是影響音聞師云閉眼說夢士禮拜師云汝是閉眼來問開眼來問士便喝師對衆云記取這漢僧至師云這幾久在何處來僧云溈山師云水牯牛在甚麼處放僧無語師云汝不在溈山來僧問寸絲不挂時如何師云裸形外道進云千補萬衲時如何師云惹火燒身進云恁麼也不得不恁麼也不得師云恁麼也得不恁麼也得進云門外人來如何相見師云或時權在手便把令來行僧問如何是先照後用師云雲行雨到進云如何是先用後照師云雷轟電掣進云如何是照用同時師云三山齊粉碎六鼇盡絶蹤進云如何是照用不同時師云月明初夜後雞叫五更前僧到師問上座今日在何處來僧便喝師云善來佛子何得惡發僧無語師打云已後不得亂做僧辭行師云何處去僧云穿山透海去師云這隻眼尚未明僧云是那一隻師便打僧云未曾拈棒已會了也師云汝作麼生會僧擬議師又打僧侍立師豎起拄杖云癡狂外邊走不識拄杖子招劍自傷身喚作拄杖子到汝分上又作麼生僧無語師與一棒歸方丈僧歸師問你從那幾處來僧敘師云還是在那一處得力僧復敘師劈口便拳次日討單師云汝擬進堂切忌瞌睡僧應諾師云浩浩之中如何辨主僧禮拜師云到底皮下無血僧問四山相逼時如何師云一椎粉碎進云坦然無礙去也師云又添幡上風僧問如何是第一句師云空無一點聚進云如何是第二句師云分明難吐露進云如何是第三句師云垂慈相濟度二僧到師云何處來僧云船上師云船在何處僧無語師便打次問一僧這一衆聻僧作把橈勢師亦打遂後不伏有僧出云昨日公案會也打不會也打成何宗旨聲未絶師又打云任從舉向諸方去僧問寒泉蛟龍還有變化時節也無師云無時節也有時節進云若到大禹門下有何方便師云搖頭是雲擺尾是雨僧問一塵不立時如何師云足下泥深三尺進云如何是意中句師云頭抵威音前進云如何是句中意師云尾掃空劫後進云句意不立時如何師云洗足來與你道僧擬議師便喝僧問默時雖無語明頭豈覆藏倣佛多蹉過請師為舉揚師云朝朝雞向五更啼歲歲春來山色秀僧問如何是十方同聚會師云兩眼對兩眼進云如何是個個學無為師云現成底事學他作麼進云如何是此是選佛場師云罕逢穿耳客多遇刻舟人進云如何是心空及第歸師拈拄杖云空得這個麼僧便喝師則打僧問家家有路透長安何處是長安大路師云出門便踏著進云不顧腳下時如何師云痛與三十棒進云已今到了又作麼生師云食草飲水曳耙拖犁僧問泥牛石虎對面相見時如何師云一喝無蹤跡潛身北斗藏僧問了無一法和尚說箇甚麼師云今日送供底甚多進云本無一物學人參個甚麼師云自領出去僧問如何是正法眼師云不在眉毛下進云必在何處師云張三一對李四一雙僧問如何是體明無盡句師云通身是病通身藥進云如何是妙玄無私句師云遍界全真遍界塵僧問學人近前擬欲禮拜則是不禮拜則是師和聲便打進云一氣不來又向甚麼處去師云鑊湯爐炭裏驢胎馬腹中僧問法門大闡廣集四來如何是衲僧入門句師云穩坐從天命進云如何是衲僧出門句師云常沾雨露恩進云出入不虛常運步一行踏破嶺頭雲師云何處不光輝僧問如何是大鞴爐內底消息師云烈火不留礦分金豈讓情僧問劍未出匣時如何師云冷靜光生進云已出匣後師云煙塵氣斂進云今得呈劍手一任定乾坤師云將來驗看僧便喝師對衆云來日東廊相會僧問此處得水金鱗後來如何變化師云揚身拋玉尺戲碧欲騰雲僧問如何是山中境師云曲曲彎彎逼直路進云如何是境中人師云輕輕巧巧過山雲僧次日相會師云昨日問底甚麼話頭僧擬議師便打僧問目前無法意在目前時如何師云浪展千條縷潭收一洞春僧問得何神通有此大用師云不是借來底進云十二處忘閒影響三千界放淨光明師云你底光明在甚麼處僧便喝師云可惜許僧問如何是衲僧出身處師云特地秋風至不涼人自涼進云頭頭舉起承他力步步相隨是故人師云出身放過說甚故人僧問父母未生即是已生即是師打云你道是已生未生僧擬議師又打僧問久雨不晴淹殺狐兔久晴不雨渴死魚龍如何是久晴境界師云霜月到頭藏不住進云如何是久雨時節師云谷雲覆頂出頭來進云且道不雨不晴時如何師云來日天晴又向汝道僧無語師云通身泥水也不知僧問拄杖子年多少師云又被闍黎添一歲進云壽同天地久結果有餘春師云家無小兒有甚用處僧問古人道虛空為鼓須彌為椎且道這鼓用甚皮鞔師云現成兩片進云誰人打得師云獨讓闍黎僧問木人每唱無生曲石女常撫沒絃琴如何是木人曲師云單為作家談進云如何是石女琴師云專等知音聽僧問獅子吼時狐兔絶蹤假若棒如雨點喝似雷鳴作麼回避師云棒下無生忍臨機不見師進云這是古人底師云尋常借路過不向臼中藏僧問即今佛法遍地人為甚麼不省師云直觀眼前境忘卻嶺後人進云何不與他點破師云既已遍地用點作麼僧問泥牛吼處天關轉木馬嘶時地軸回如何是泥牛師云耕破波心月吼通劫外風進云如何是木馬師云踏翻栗棘地跳出金剛圈僧問世尊拈花示衆和尚將何為人師云清早起來不曾有利市進云謝師餘惠師云既不曾有謝個甚麼進云雲向山中騰出巧月從林外過來新師云你又向何處過來進云請師下棒師云道破不靈僧問學人從偏位中來請師向正位中接師打云是偏是正僧擬議師連棒打出僧問古來有個十無語諄諄有語是何緣師云門外山階是誰砌進云不識師云慚惶有負行人心進云師意若何師云有處問將來進云如何是無為國師云聖凡不在裏頭歇進云如何是無星稱師云撥兩分星成滯鈍進云如何是無根樹師云百鳥從來栖不住進云如何是無底鉢師云一來一往是誰拓進云如何是無絃琴師云天真嘹喨少知音進云如何是無底船師云這邊踏著那邊掀進云如何是無孔笛師云一曲當風明歷歷進云如何是無鬚鎖師云香廚封禁無煙火進云如何是無孔鎚師云八部天龍盡帶悲進云如何是無底籃師云不放魚龍到長江進云如何是無縫塔師云聚堊飛塵點不納進云有語得明無語義不知無處義如何師云今日客繁且去著僧果行師云何曾得明僧問賓主到來如何相見師云眼觀東南意在西北僧問金風吹玉管那個是知音師云有個靈利道者不覺放過僧進語師便喝僧問學人一寶請師酬價師云將來驗看僧作拓盤勢云請師鑑納師云無處收藏僧出打圜相云是佛是祖俱在這裏未審和尚出得這裏麼師打云鬼眼睛來這裏賣弄進云毗嵐風動何處安身師又打僧問諸佛未出身時如何師云凍雲彌四野寒雨滴千峰進云已出身後為個甚麼師云鄠杜月頻滿瀟湘人未歸僧問釋迦老子鼻孔在甚麼處師云已被迦葉穿卻進云坐斷千差將何化為百億身師云禍不單行僧問曾思明珠欲來獻上正覓不可得時如何師云好箇消息僧問如何是金剛寶劍師云一揮無滯礙當下絶煙塵進云如何是踞地獅子師云同類增威勢群狐喪膽魂進云如何是探竿影草師云有語不須辨抬頭見假真進云如何是不作喝用師云休設安邦計端然享太平進云假使戰將臨機又作麼生師云不知是何武藝進云適來奪得寶劍在此師云把出來看僧擬議師云生鐵難瞞僧問鐘鼓交加是何妙音師云聾著兩耳才堪聽進云龍象相會是何面目師云瞎似眉毛方可窺進云只如不住內不住外不住中間又作麼生師云須得一半未足可觀僧問未出方丈時如何師云四衆莫測進云已出方丈後師云知音方可問無解不須言進云學人擬欲奪卻拄杖得麼師云具何作略僧云梢具衲僧手當機不讓情師云如何是不讓處僧便喝師打云人人有分莫道私行勘辨師問僧按吹毛劍截斷根塵提迅雷機打徹正眼只如兆未分時動著也無僧云不曾動師云這箇來為先鋒去為殿後底僧擬議師喝出云莫道奴郎不辨問僧跳出生死關頭如何又要披毛戴角僧云祖禰不了殃及兒孫師云莫謗他好僧云此意若何師云莫道不了自愧始得僧進將禮拜師以杖頭抵住云道道僧便喝師便打僧連喝師連打問僧看他適來喝個甚麼僧云老大宗師話頭也不識師云一坑埋卻問僧古人見花悟道擊竹明心且道明底是那一個心僧豎一拳師云這個為復本有借事而生僧無語師云來朝更獻楚王看問僧如人數他寶自無半錢分將你分中道來看僧進語師打云再露不堪問僧生死交謝寒暑相遷唯有甚麼人不被他轉僧近前師云火上更添油僧不動師云瞎漢歸堂去庫頭進師云汝不是堂裏人到此作甚麼頭云和尚莫錯認師卓拄杖云你作麼生抵敵頭便喝師打云同寮無別殿問僧我這裏一無禪參二無道學你在此間圖些甚麼僧云飽餐饡飯師云只是你不會洗鉢僧無語問僧一個無意味底消息他便喚作饡飯你又喚作甚麼僧擬議師一並打出問僧一語不疑是為大病疑情頓破別有何物僧亂道師便打僧不覺坐具落地師云好個消息問僧門外描蹤捕影不如直下承當此意如何僧云即心即佛師便打問僧他道即心即佛合皆喫棒你今又作麼生僧云非心非佛師云馬大師將甚麼面目見人僧彈指一下師打云也要賞罰分明問僧適來二人答處山僧一機定度且道賞底是罰底是僧擬議師云放過不打要你領出問僧現成公案不用別參正與麼時如何折合僧滯立師云去僧才行師云且來著僧回首師便喝問僧佛未出世你在何處安身僧云口小道不出遂問一僧祖已西來何處薦取僧舉起坐具師云他行不到你又太過問士南泉老師斬貓佛日和尚喂貓這兩個老漢那一個是士云二邊不立師云三世諸佛再來出他圈外不得士無語師云今日失利問僧未曾出堂腳下蹉過而今覿面何處相通僧云覓火和煙得擔泉帶月歸師微笑問僧這個上座來得路遠便道覓火和煙得擔泉帶月歸我這裏也不擔泉也不覓火且道月在何處僧茫然師一共打出僧進云某甲初入乞師指示師云翌日又來僧出師召云且來著僧近前師云是甚麼僧擬測師便打問僧碧天孤月朗滄海驪珠明在甚處相映僧云不出這段真風師云是那一段僧擬議師與一棒便行拈問代頌師居山暇之時然不絶往來者鮮值中正諦當之緇嘗曰像季佛法果爾如斯也故拈數問以激來學間有著語並頌尚未扣其機耳故師戚之不已感嘆自代而頌之謂衆曰古人聞聲悟道時時有聲今人因甚不悟師代云迷流別影響達者不聞聞頌靜夜鐘聲徹四鄰擬心相聽已乖真時人欲證三摩地休向耳邊認識神古人見色明心處處是色今人因甚不明代云觸目無分別清光一道齊萬古明星燦碧天原從雪嶺至今傳如何不合瞿曇意瞬目揚眉落見邊直饒不是聲不是色不是心不是道又作麼生代云雲收天本淨風恬海自清頌綏靖華夷意若何太平時境息干戈不勞定國平天下現位王登野老歌佛出世祖西來有禪參有教誦未出世時且道誦甚麼參甚麼代云直下翻筋斗活機遍大千頌眉間現有白毫光出格男兒豈傍牆一色山川俱道眼分輝草木盡文章三乘教典俱是後人徑路如何又是教外別傳代云日照孤峰翠月臨溪水寒頌蜂蠅交舞共窗遊紙上尋光豈出頭忽遇其人輕扯破百千妙用一時酬古人道終日喫飯不曾咬著一粒米誰是不咬著底代云天堂收不得地獄孰能該頌無影山前竟未深何須著意遠推尋三禪風卷原非動越出春秋更古今三世諸佛俱成正覺為甚又云上無佛道可成代云折卻月中桂清光應更多頌等閒覷破鏡中花彈指圓成共一家此際若隨名相轉真金依舊混泥沙歷劫衆生俱淪苦海為甚又云下無衆生可度代云既化山頭雪難停砌下冰頌癡心戀著草頭霜夢裏登臺作戲場大夜翻身一覺醒天明便是普光堂緣覺聲聞皆得道果為甚麼不到這裏代云毫氂有差天地懸隔頌欲避難逃景在先日光朝與水光連只須看破其中影始信前潭非是天大乘菩薩已到這裏為甚麼不肯住代云踏破須彌頂縱橫非是虛頌不立峰頭別有程雲巒海島任他行一朝拄杖成龍去遇旱為霖濟有情三世諸佛之玄微為甚麼口說如啞代云暗裏抽橫骨明中墮舌頭頌禾苗卉木枯森森一動天心便轉陰甘雨悠悠然未降雲鋪五嶽半天沉歷代祖師之妙道為甚麼無心乃證代云放彩霞收盡懸鉤月在巔頌晴空朗朗正青天風卷殘雲點不連萬戶千門澄似水杜鵑啼在月明前菩薩戒弟子如惺號明慧如暟號雪澗廓學號了見捐刻密印禪師語録第八卷伏願解如來義同明出世之因悟祖師機共入無生之旨康熙二十一年壬戌歲季秋月板入浙江嘉興府楞嚴寺般若坊附藏流通本郡信士吳知先書梓士倪天章刊

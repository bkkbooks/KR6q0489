body:
  text: 門人如暐等編雜偈隨處安居示衆二十首滔滔巨浪覓魚蹤杜絶根塵許進功識得去來無去者不妨泥水污英雄人言宴坐己心休雨到泉通水又流淺壑深溪無滯礙同歸大海漾天秋龍門透出是豪英平地一聲萬里驚六合風雲相聚會自然頭角便崢嶸機輪轉處不差移明暗交參要合時只在工夫圜得到黃花晚放未為遲疑團既破已超情豈在如棋局局爭一著之先如會得不勞起手定輸贏無棹呈橈在水中現前舟穩又無風尋常不用人拖扯伴月和流處處通兩無著岸一舟輕懼甚中流有浪驚不捨光陰還進步為人豈負一平生對境情忘一旦休生來死去海中漚度人悲願無餘事萬頃滄溟一葉舟無根樹子與天齊只見鶴眠鳥不栖靜夢穌回一覺醒規成萬古作標題一光景過一光鮮寶鏡家家似月圜白髮老人羞見面不慚落醜在人前漏滴銅壺永夜長到頭霜月莫倉忙從前任運行將去古木林中盡是光我王庫內勿干戈正用將來著力磨佐國安邦猶在後先看演武事如何初晴乍暖遇奇場切莫學顰去點妝試看古來操進者甘嘗上味必經霜人間有雨上方晴直達虛玄格外明霧卷星飛如彈射林中宿鳥一齊驚曲水成灣雨不調難通海嶼未能消禹王見得無何計獨把獰龍尾後燒轟雷掣電兩開張逆者聞之尚未詳落葉從容鋪滿地歸鴉點點噪斜陽為人休效井中蛙見未寬時莫浪誇一跳出頭開眼看青天無際海無涯靈貓捕鼠待深更不被寒風永夜生此物況能當仔細啖龍金翅莫非輕一任他喧我不囂休隨世類當逍遙排身直到青松嶺鶴唳方知片月高迷流不省甚堪憐兩袱一擔到處旋失業拋家全不愧傳言送語當新鮮贈明旨胡居士虛靈不昧轉身酬凡聖同圜一貫周踏雪尋梅山外取披雲擇玉石中求明窗入定寒庭冷暖閣傳聲夜漏幽欲見如來真實相一溪兩岸展雙眸昭然朱居士春回幽谷一聲雷震動青山發秀開起霧興雲沖碧漢插天卓地賽崔嵬曾經劫火終非壞縱遇嵐風定未摧便是妙高難覓處善財相見別峰來廣智胡居士昭然大道絶攀求才涉思惟過九州喪盡目前黃檗棒爰通肋下大愚鉤梁王西慕情愈遠童子南詢路轉幽彈指門開彌勒院河沙妙用一時周贈越凡徐居士居廛寶殿住山堂萬象當軒豈覆藏夜雪藍關長客路秋風蓬島遠仙鄉三乘有辨千差起四果無修萬法忘直切若能明祖意門開一見悟心王六明劉居士浪中別寶識源由識得源由入聖流紙黑燈籠防露柱水清月影占鼇頭逢緣照著通身顯對境掀翻徹底休體性光明原不減平常一味絶馳求廣福徐居士懸岩絶磴少人知不屬陰陽運變時那有毛端吞巨海然無芥子納須彌春回野甸花才放風到長江舶自移頓破凡情非聖解空投空處沒多岐贈明皓尹居士碧嶂生輝翠不昏舒光照處有誰論道超物外離言徑用向軌邊啓妙門鸞鳳聲聲鳴造化麒麟步步動乾坤清音詠出東風轉歷歷千年此道存贈曹居士四大滄溟一月連同交共映總相然翳除可見光生普障盡方知影現全事合目前圜覺海理歸腦後夜摩天桂輪更有青霄外單許盲人達此禪贈梁居士胸中文彩沒毫絲雲在天邊水在池萬里同風離覺鑑一塵有滯落情疑求珍必假從斯岸採寶何須論渺瀰吸盡西江還教吐現成底事絶言詞廣榮曹居士孤光無際有誰談錦未出懷早已含塞斷識流忘幻夢熏開心地長優曇千年桂轂然輝世萬里天青現指南共顯一如高著眼梳通門外請相參贈明湛陳居士幾點明星對月邊風搖不動映山川一聲嘯矣藥山震三嘆奇哉雪嶺傳亂石和泥堆野徑紛沙合水混清源若然浩浩隨流去恩負當時大覺仙贈明和孫居士海底明珠燦白毫龜浮木孔未曾遭懸思鳥道千旬霧深想魚蹤萬頃濤皎皎靈光侵海岸團團慧焰爍塵勞位登無垢成男子果感文殊萬古標贈明晶楊居士試問何時會合頭夢中做夢夢無憂人間花暖三春樂嶺上風寒萬古愁初祖真機依髓盡大梅密語至心休怎如臨濟吹毛利四海煙雲一劍收贈化清瞿居士徑逢嶮處愈能通通得精明孰與同焚鈔德山情已盡推門偃老路先窮方懸照膽光明器正運司南造化功擎罷蚩尤無轍迹當知意氣是豪雄贈明瑩馬居士妙湛靈源洞本然一波才動萬波漩金沙混合休隨浪雲水依俙莫認禪江岸二途如是度明珠九曲作麼穿搬窮伎倆復來問笑指澄潭月在天如壽王居士寶明空海闊無邊只為風來有浪漩韓信囊沙終是計秦皇鞭石盡為權瀝乾浩若超生死才動毫茫落正偏湛寂凝然何處住洛伽依舊向西天如福何居士頻頻拈出自家珍立意推窮便不親死水藏龍珠作伴陰山覆玉石為鄰輪王頂上慈光現良友懷中慧焰伸歷劫應機無向背塵泥揩盡依然新贈碩雲禪人物得先天雨露恩風雲聚會在龍門星明海底珠千顆春到園中錦一村寶藏俱交娑竭老家常盡付飲光尊當時處處垂方便末後如空點不存贈默定禪人作雨為雲事不愁威音那畔有來由周遊梵位三千界旋繞仙臺十二樓慧日當階微有影心風拂社盡無酬一聲霹靂除高下潤葉滋花當下收贈暹月大德虛堂寂靜本悠悠體露常光豈用謀日出黃鸝吹玉管夜來白月挂銀鉤侵庭色相門前現匝地清陰樹下留舉目能知時節至家山穩坐不須遊贈法脈大德春暖陽和淡蕩風晴霞殘日映山紅幽瀾滾滾歸滄海翠嶺巍巍襯碧空白雪消瓊心便了清冰化玉意方窮雲屏近日無遮礙四智三明一竅通贈指月堂監院南城北郭一般春得意參玄道日新禁夜樓臺鐘扣緩催年閭巷鼓吹頻千門燈火分光彩萬戶笙歌露法身莫逐時情作境會拈來都是自家珍贈爍吼法侄細煉精磨覺有神將來載道遠相陳黃金果熟風雲暖白玉花開雨露新滄海岸頭常有潤藍田地裏自生春時來用在目前取應物無虧現彩彬懷美爾李先生重重雨露接江城浴日功深兩岸迎碧洞興雲山嶽秀滄溟涌月鏡臺清洗心屢看前賢義觀世常懷濟物情莫是靈山親有願護持此道秉權衡贈國楚陳居士瞬目相逢一切逢塵塵無礙露全容返身就位明斯旨轉步投機達此宗走霧天邊呼玉鴈飛雲海上釣金龍竿頭放下端然靜撑月珊瑚一色同贈君選賀居士升空耀宇照疏簾一片光瑩萬法全寶鼎香飄參玉篆洪鐘聲應悟金仙智源永作曹溪浪慧焰長輝舍衛天冉冉祥雲猶未蔽群星拱在月明前贈勝甫曾居士間向波瀾深處遊慈心不倦泛輕舟懸篷把舵觀風動探浪諳波看影浮兩岸無依同碧眼中流不住合黃頭一幡倒卓安然坐雲自高飛水自流贈覺圜上座長江月映斂秋嵐朗耀無私信水涵香象度河截巨浪蒼龍鬥影臥沉潭兩輪普照原非二六合齊明只有三識得其中光遍布了無禪道可交參贈大用大德猛力乘船出愛河滿江風順片帆多久垂細雨空如漏忽散輕煙月似磨祇樹休推賢長者毗耶莫問老維摩逆流撥轉回光照共岸同登一剎那贈雲量禪人雲彌敷布量無涯繞遍閻浮覆萬家自去自來隨變化相牽相伴任周遮迎蟾出海彰瓊幔送日歸山放彩霞江國春風吹不散回文高挂映中華贈頂目大德闔國安寧四海清霜迎甲胄為誰爭全提石鞏單弓箭射退魔王八洞兵華藏雲開星現彩黑山風動雨傳聲邪機搜盡分賓主一片寒光萬里晴贈破浪大德秀麗陰濃正不蒙因心是境在其中枝聯翠葉含春色花噴清香露曉風龍象相參觀上下天人往返問西東若然到此親分析便與庭前柏子同贈伯聯蔣居士饒有修行未脫空目前有礙被情蒙浮雲岫出山頭白落日穿霞海面紅就岸寒蟬能飲露出群駿馬慣追風然俱一到天明曉直在前潭一鑑中贈慧達大德漪紋海漫徹清淵藏滿龍宮莫外旋浩浪俄澄舟穩當浮煙乍散水新鮮相持鷸蚌都皆醜飛躍鳶魚總是偏觸目無疑明此事塵埃半點不相連贈玉成大德妙明空際展濃雲彌布山川卉木欣伏虎岩前風颯颯降龍座下雨紛紛見圜必假從初地理極何勞守大勳黃葉枝頭猶未謝青苔石上偶成文贈純和大德頓忘所知未生前無玷白圭有妙傳象骨輥毬聲播世祇林舞劍氣沖天承當一路歸家舍擬去千方涉外廛他日話頭今日意相逢莫道我重宣贈圜明蔣居士莫將學海較江河達本逢源豈自他慧日初升彰淨影心風才動發狂波收來一鉢乾坤窄放出千溪路徑多頓徹百川清見底交參上下照娑婆示月菴禪人虎驟龍驤一喝擎磨光直射斗牛京飛星爆竹難留意裂石崩岩豈縱情霞老骨寒燒木像盧陂話墮展降旌蛟龍不怖吹毛劍嶮處翻身任縱行示穎微禪人四維古樹立山岡風撼濤聲震大荒開卷焚香雲掩砌迎賓卷箔月臨堂迢迢野色鶴歸隴浩浩晚風燕歇梁共看當階然各惺那堪詩偈落禪房示惠林禪人勘破浮生一幻休孤村無客夜堂幽硃沙寶石千家兆玉露金風萬里秋舉首當天休動步抬眸對月免登樓晨鐘擊破他鄉夢開眼依然在此州示德嶠禪人吹毛鈍了急須磨見不平時也用他無影山前截爛蔓不萌枝上斬煙蘿勦除魔黨功猶勝斷滅邪群智轉過輔弼法王行正令一人有道萬人歌贈純賦大德天鼓洪音驀地撾驚開蟄戶睹光華穿山透海遵神禹煉石補天讓女媧白浪滔滔翻日影洪波滾滾蕩河沙歸東不礙承渠力闢就通淮共一家示月輝大德圜明心寶即摩尼妍醜分明未有私對物應形無隱也隨方現相任周之沒之又沒經多劫迷所以迷到此時障蔽苟非親見者萬般施設總非宜示正照禪人雲覆青山見者希平中有嶮更巍巍不同百鳥調音唱豈作孤鴻帶影飛兩盞清燈燭夜暗一聲靜磬發天機人來欲覓菴中主難免將身步翠微示應法禪人不用安心心自安安然林下靜中看世情名利輸他分山色煙嵐讓汝觀嶺上松青經歲久途中蘭翠待時難少林別有真消息只要時人不自謾示光輝禪人活計從來隨分定清貧常樂道人風堪憐西徑無賢往卻笑南岩有物同側耳方聞鶯與燕抬眸難辨色和空心心湛寂澄如水任爾操戈何處攻示智目大德萬別千差一道圜出雲杲日麗長天觀山玩水分濃淡逐妄迷真論後先休縱情緣依世境常回智水濯心煙併除一念同真際正好開池去種蓮示本淨禪人古人為道入林中一片虛無達者同碧落空中消影相珠璣簾外闡家風波騰闊海千層白日運高山萬頂紅燦爛蒸霞皆佛事隨機應遍轉靈通示慧峰禪人滯霧凌霄少見晴涉山多謂路非平千巖豈獨分高下萬木何猶論豎橫有體虛空須應證無門道路莫剛行風馳宇淨蟾光現巧手尖新畫不成示靈益禪人搏風九萬化鵬鯤會合川流一口吞每視金輪旋海藏常觀玉鑑繞崑崙禾山打鼓驚沉夢破嶺栽松作徑門非古非今然薦得明明有眼未曾昏示空石禪人同光一寶定中原興化投機逗此緣有漏河中安鐵舵無為國內涌金蓮陳年故物渾非用今日新條一頓圜大道門開俱在眼禪床窄處莫隨眠示嘯峰禪人靈翼脫籠出現高仙鄉蓬島任遊敖別傳少室機猶錯更指石頭路轉勞塵盡盤中珠燦燦風生海面浪滔滔不聞月下猿啼事觸目無心見碧霄示煥然禪人南華一派古今傳不合靈源墮悄然寶壽杖拋禪座下夾山語挂碧巖前兩儀未判歸空際萬象猶彰落見邊紅影箭穿言路盡屈將良駟苦加鞭示盡得禪人不分高下普門堂大意全彰不可量海底春熅生玳瑁崑岡霧暖産琳琅穿簾皓月垂光遠繞寺青山列畫長舉步間能行一匝方知嫩桂久昌昌示智懿禪人日到榑桑動曉雞聲聲山嶽等皆齊水寒夜靜魚猶隱林茂春暄鳥正栖風送飛雲歸嶺北花隨流水過橋西紅輪本不分高下曙色清光映滿墀示雪澗禪人識得金剛體最堅摧邪輔正有威權量含法界離拘執本證虛空越變遷光照三禪開慧鑑風生八極掃塵煙分身處處為良友勝出寒山去作顛示澤先大德不繞閻浮覓梵宮各藏一寶在山中刖和楚帝德無用剖璞文王勘有功凡聖當階同共見天人覿面總相逢如今遇石休重抱赤肉團邊顯璨容贈實音大德將心理會莫安排背則差兮向則乖有月溪頭知未蔽無雲嶺上見何埋風帆遠浦悲秋望觱篥邊城苦夜懷內有法身無出沒逢緣同鉢赴香齋示明慧大德人間夜靜月中央心境同圜一鏡堂經入藏邊法住久禪歸海處派流長千江有水團團影萬里無雲片片光佇望循環今不遠回頭返照不瞞藏示法常大德休擇山涼與寺荒經行坐臥獨尋常不隨孫敬懸頭髻一任匡衡透壁光無礙無留風過樹有清有潔月臨塘飽餐放下忘人我散步逍遙樂此方示破暗大德靜夜燈輝徹殿堂除昏破暗未瞞藏明如寶鏡然非鏡燦若金光豈是光兔子休思天外月蠶兒少戀地頭桑不存玄解分妍醜外象由來影自彰示澄湛禪人水國湛然合太清汪洋不動正澄盈有心採寶寶難搆無意求珠珠現成偶爾風生翻浩浪須臾霧斂顯長庚休提吸盡西江事萬派同歸直下迎示圜容大德風滿瑤臺月滿樓六窗顯露孰同儔林中搗藥祥雲潤廊下煎茶瑞氣柔得意禪人孤迥迥尋牛童子鬧啾啾古人更有天真佛聖去凡來不肯收示岩璞禪人寶置岩前歲月深逢渠孰忍應埋沉粗鎚擊石分暉玉烈火烹沙煉赤金落向聲前屬有象裂開句外得無心和盤拓出難分辨對面思量又過林示印心大德弱水三千漾碧波一恬便靜本無他渭濱枉用拋金釣劍峽徒勞放木鵝煮淡熬清心事少煨爐採柏案香多離鉤速道山擬議怎怪華亭肯讓過示本意大德雪嶺瞿曇睹夜星輝天照地鑑滄溟一時徹悟無凡聖三嘆慈音動嶽靈得旨回頭歸寶所忘懷舉步落山陘休勞普化風顛起又向長街振木鈴示佛明大德深沉寶藏不須撈浪靜光生見白毫窮子奔馳經嶮峻驪龍驤驟起波濤明明對照非他物歷歷平觀在爾曹從古至今輝不減思惟蹉過價錢高贈雲嶔上座傳戒閻浮欲海浪漂漂去聖時遙愈漸潮好把福田親整頓弘開戒度惜嘉苗贈仰忠上座傳戒像季時來雖眼清不存律法被人輕闍黎有德堪加贈單效波離樣子行附靈隱老人塔銘碑記嗣法門人真傳拜撰師號靈隱諱印文四川夔州府梁山縣王氏子齔從本邑蘭木寺披剃參越二十載正續臨濟三十二世乃破山明翁之法子天童悟祖之嫡孫扇真風於滇黔印心法於蜀楚至丁未春世緣已畢坐脫於貴築之大興寺豫十載前緣化楚地遠未知終偶聞訃音不憚時炎遂𨀖而至突見不遑次年復令弟子照俸迎歸師之舍利幸以檀信樂從而窀穸得所矣便捐衣鉢之用建塔於湖廣靖州會同縣若水鄉魯沖旗山永興禪院之西麓憶師存日心光透脫迥出根塵末後到來轉身物外平步青霄始終全提今之是也遺作指顧乃述其銘曰旗嶺之下秀峰之前創其窣堵卓爾巍焉妙象超格奇標入玄層層峭拔縫縫聯綿不落偏際所因正傳三重遞接六合相連巨壑流水長松舞煙青獅踞地翠筍插天一嶂雲盡千山月圜常光貫世道範如然時康熙七年歲次戊申黃鍾月蓂凋十莢勒石建立重修廣福山勝覺寺疏引能仁出現懸慧日以當空應化無方駕慈航於欲海古以人誠感格聖迹昭然而況水繞山旋林鬱境秀按碑建自周朝遞代重修屢次迄今十載餘前兵戈攘壞僧將半百逃竄四方香煙絶侍瓦片零落牆壁頽毀佛身曝露豫以觀之實乃感傷何得仙境煥然一新故集有志緇流募修古寺堪為選佛之場然非獨手而可為之既謂選佛之場所為何事欲會達磨不向東來釋迦未曾出世向上一著超出有漏之因頓入無生之旨心包法界體合真空離四相越三乘雖度衆生無生可度斷翳眼滅空花俱成佛道無佛可成闢未闢之昏衢了未了之公案以此先覺而後覺他名曰勝覺選佛之場也功莫大矣乎安有涯量哉凡仗宰輔高賢貴客達士深察古往今來莫負靈山之囑須知三寶住世福田一種一收定無虛也作如是因獲如是果果因滿足人中尊勝咸荷匡扶法社無以朽之云爾癸卯孟冬上旬述於廣福山中重修旗山永興禪院疏引苦海沉淪永不休故勞諸佛重興世遂離兜率捨皇宮六載雪山曾悟契睹明星觀大地情與無情同一器因病多端使藥方執方成病復難治末後來拈花示迦葉露顏得此意正眼流通永不絶始傳四七西天記初祖來光兩地一花五葉相承嗣炳然杲日正當空幽壑林中説未備見不平何以利須建叢林立佛寺見聞瞻禮及稱名一念了然非漸次慕檀越最勝志體佛心而行佛事身居塵世亦非塵超出世間非越世能令法界未聞聞共願同圜一切智己酉年仲秋月衆請題於旗山永興禪院密印和尚塔銘碑記楚南金城七十叟劉禹甸焚香拜撰法弟子劉湯懋沐手敬書原夫乾肅象正瑞藹坤靈沖虛結萃賢者出焉自西天東土歷代祖師乘悲願以出者莫不示其由也蓋白業境界詎常情能所測之逮以圜機應世雲水馳名王公欽羡神鬼遵崇猶恪然者而生衛法之心也豫以履師捷徑針芥相投體契紫雲用明師典無以自效輒贊其源故永貽於後耳師諱真傳號密印姓李氏原籍四川敘州府寓以貴築之安順天啓乙丑歲誕日晴霄正晝白氣舒騰時母忽倦就榻而寢正寐之間見得滿屋無障四壁俱空熟桃滿株從東撲向覺而誕之其年六月二十八日也師垂髫之時弗從他教自不茹飲省知世間俱屬幻化嘗誦法華經至火來逼身苦痛切己心不厭患無求出意之句掩卷不覺潸然因此遂有出塵之念家緣世業渾不著己事其二親謝世自詣觀音洞剃髮除務之暇嘗閲教典並覽宗猷雖未深諳道義然心中爌有契焉遇一老僧謂曰陳年茶飯不必苦啜須知有教外別傳師曰何為教外別傳老僧曰放下自有端的師從此後少以執卷默而靜坐身心渾忘如此半載偶爾一宵月地經行聞鐘豁悟覺得已往所看教中從聞思修之旨炳然不疑胸中礙膺當下冰釋聞得語嵩和尚住貴築之牟尼次受三潮水禪院之請整理參見四來雲集臨冬結制具圜戒法不憶次年有病辭歸調理後寄書以問之師覽修復兼呈偈曰鼓浪長鯨出海遊風雲相聚要吞舟誰知泳入三潮水是病浸成永不休又固病不離生死因離時誰共我相親純清絶點難留住應用權將作故人又袖未藏鋒一著先然無月色過前川今時不肯將心負任運分輝顯洞天自復書之後病未脫體舉步難行未幾復遇靈隱和尚從蜀而至駐錫師菴共居一載未周偶值世亂因衆檀信欲同接上滇中遂將曹溪來源而謂師曰佛祖位中有個了不了事要汝承當師曰如此病質不能擔代復辭不允勉而受之師從己亥春率衆臨楚錫挂白雲東城次受波羅請以闢建然後結制於回龍砌修前樓七棟復遷勝覺預成棘林草地朽礎敗甓今之殿堂旋廡百廢俱興不幸靈老和尚以向貴省圜寂師不憚勞以往次迎舍利而歸衆眷之虔塔就緣以故創旗山連修祖院廣其砌而拆堊更新殿立恢宏高楹三丈廊接四周每坐道場共有語録鋟行於世蓋近以來甚有稗販徒衒聲名承虛接響誤賺後昆以致法門漸漸寥薄殆將古人宗風每每移易多矣師屢因勞苦鮮以御下燕處息心不甚酬酢間有久依弟子長親居士誠捐確意建塔於湖廣辰州府黔陽縣安江廣福山勝覺寺之前隴故請銘於豫也夫唯師之道而心意識尚以莫測詎銘之所能歟但以行實家風微以述之詳師髫而厭世越出常流冠以嚴持梵行清白滿千武士瞻德容而息惡從善成百異道觀行徑而歸正卻邪鄉友稱其應化之賢宰輔讚其再來之聖居法位後猶前悟徹淵深工夫急切原以性根猛利發機甚疾當鋒者少利物如鵬擘海接人似劍出匣具煉佛祖之用足煆凡聖之能門徒晚輩及度後人承爐韛以未授復別出而各擅家聲唯師道眼精明吹之數省德海澄清溢之四外故托其由爰系之爾銘曰臨濟真宗天童獨盛法傳破山枝茂根正靈隱相繼紹於密公全提祖印正脈弘通手垂格外劍按當門雲水相望迎鋒已奔觀今甚濫效古行持掃盡狐族覓獅子兒育德耆舊久依不孤孝當竭力建此浮圖江山作供日月為燈地久禪谷天長壽陵迷有生滅悟無涅槃常光更古慧眼能觀豫言石載師行冰清誠以稽往故為是銘時康熙十四年歲次乙卯孟春月中旬上元日闔山耆舊同四衆人等是日勒石建立湖廣辰州府黔陽縣安江勝覺寺衆弟子等靖州會同縣魯沖旗山衆弟子等同共捐刻密印禪師語録十二卷伏願生生迥出幻緣敷因花而嚴萬行世世不忘正見圓道果以歸一乘康熙二十一年壬戌歲季秋月板存浙江嘉興府楞嚴寺般若坊附藏流通本郡信士吳知先書梓士倪天章刊

front:
  text: 密印禪師語録序明心見性三教同原其傳之語言文字者末也然而不得不以語言文字傳之者現前説法示後之津梁也故孔氏有兩論子輿作兩孟曾子誠意正心子思原天明道皆以語言文字流傳古今而後之大儒得其淵源垂為著述者歷世不少乃考禪門亦然自達祖渡江以來傳至六祖一花五葉厥派攸分然五宗中臨濟為最歷代相傳不可殫述近所最著者有破山和尚語録盈案其開示棒喝實為後人而密印和尚是其宗派焉籍出西蜀飛錫楚南茲寓廣福山者三十餘年矣有語録贊偈彙成一集皆明通了徹洞見本來不墜破山衣鉢今者請序於豫豫曰吾固儒家子也何足以言禪然閲其文辭領其意旨大約以明心見性為宗超脫塵凡為要所謂現前説法指示後學者端不外是寧得謂禪家之言非吾道也而可不為之稱揚贊嘆哉至其會心自得曠然天地之外有非語言文字之可傳者則吾不得而知矣賜進士第河南按察司副使分巡汝南道前督理張秋河道工部營膳司郎中莊鏻謹撰目録卷第一之三上堂卷第四小參卷第五之六開示卷第七法語牧牛頌十無語頌卷第八機緣勘辨拈問代頌卷第九頌古卷第十山居集詩水居卷十一雜偈諸贊真贊卷十二雜偈疏引塔銘
